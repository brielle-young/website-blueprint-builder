    <meta charset="UTF-8" />

    <meta name="description" content="RISE helps U.S. residents discover energy rebates, water incentives, transportation programs, and recycling initiatives by state." />

    <meta property="og:title" content="RISE — Sustainability Programs Directory" />
    <meta property="og:description" content="Find energy rebates, water incentives, transportation programs, and recycling initiatives in your state." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <script>
      // Single Page Apps for GitHub Pages
      // Decodes the redirected path from 404.html back into a clean URL for React Router.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
